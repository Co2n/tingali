<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Data KTP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 15px; }
        
        .kontrol-atas { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .kotak-cari { display: flex; gap: 5px; flex: 1; min-width: 250px; }
        .kotak-cari input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .kotak-cari button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .kotak-cari button:hover { background: #0056b3; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: middle; }
        th { background-color: #007bff; color: white; text-align: center; }
        td { text-align: center; }
        
        img { max-height: 50px; border-radius: 4px; border: 1px solid #ccc; transition: transform 0.2s; cursor: pointer; }
        img:hover { transform: scale(2); z-index: 10; position: relative; }

        .pagination-container { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .btn-page { padding: 8px 15px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-page:disabled { background: #cccccc; cursor: not-allowed; }
        .btn-page:hover:not(:disabled) { background: #5a6268; }
        #pageInfo { font-weight: bold; color: #555; text-align: center; font-size: 14px;}
        
        #loading { text-align: center; font-weight: bold; color: #007bff; margin: 20px 0; }
        .btn-tambah { padding: 8px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-edit { padding: 5px 10px; background: #ffc107; color: black; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        /* Modal Edit CSS */
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        .modal-content label { display: block; font-weight: bold; margin-top: 12px; margin-bottom: 4px; font-size: 12px; color:#555;}
        .modal-content input[type="text"], .modal-content input[type="file"], .modal-content select, .modal-content textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family:sans-serif; font-size:13px;}
        .modal-content textarea { resize: vertical; }
        .form-row { display: flex; gap: 10px; }
        .form-row > div { flex: 1; }
        
        .btn-simpan-modal { background: #28a745; color: white; border: none; padding: 10px; width: 100%; margin-top: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-batal-modal { background: #dc3545; color: white; border: none; padding: 10px; width: 100%; margin-top: 5px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🗃️ Master Data KTP</h2>
        
        <div class="kontrol-atas">
            <div class="kotak-cari">
                <input type="text" id="inputCari" placeholder="🔍 Cari NIK, Nama, atau Desa..." onkeypress="jikaEnter(event)">
                <button onclick="terapkanPencarian()">Cari</button>
                <button onclick="resetPencarian()" style="background:#dc3545;" title="Bersihkan Pencarian">✖</button>
            </div>
            <div>
                <button class="btn-tambah" onclick="window.open('app_ktp.html', '_blank')">➕ KTP Baru</button>
            </div>
        </div>

        <div id="loading">⏳ Memuat data...</div>

        <table id="tabelDbKtp" style="display:none;">
            <thead>
                <tr>
                    <th style="width: 5%;">No</th>
                    <th style="width: 15%;">Foto</th>
                    <th style="width: 25%;">NIK</th>
                    <th style="width: 25%;">Nama Lengkap</th>
                    <th style="width: 15%;">Desa</th>
                    <th style="width: 15%;">Aksi</th>
                </tr>
            </thead>
            <tbody id="isiTabel">
            </tbody>
        </table>

        <div class="pagination-container">
            <button id="btnPrev" class="btn-page" onclick="gantiHalaman(-1)">⬅️ Prev</button>
            <span id="pageInfo">Halaman 1</span>
            <button id="btnNext" class="btn-page" onclick="gantiHalaman(1)">Next ➡️</button>
        </div>
    </div>

    <div id="modalEdit" class="modal-bg">
        <div class="modal-content">
            <h3 style="margin-top:0; border-bottom:2px solid #ffc107; padding-bottom:10px; text-align:center;">✏️ Edit Data KTP</h3>
            
            <label for="editNik">NIK (Tidak Bisa Diubah)</label>
            <input type="text" id="editNik" disabled style="background:#e9ecef; font-weight:bold; color:#555;">
            
            <label for="editNama">Nama Lengkap</label>
            <input type="text" id="editNama">

            <label for="editHp">No. Handphone (WA)</label>
            <input type="text" id="editHp" maxlength="20" placeholder="Contoh: 081234567890">
            
            <div class="form-row">
                <div style="flex: 0.4;">
                    <label for="editGender">Gender</label>
                    <select id="editGender">
                        <option value="L">Laki-laki (L)</option>
                        <option value="P">Perempuan (P)</option>
                    </select>
                </div>
                <div style="flex: 0.6;">
                    <label for="editTglLahir">Tempat, Tgl Lahir</label>
                    <input type="text" id="editTglLahir" placeholder="Kuningan, 31-07-1986">
                </div>
            </div>

            <label for="editAlamat">Alamat Lengkap</label>
            <textarea id="editAlamat" rows="2"></textarea>

            <div class="form-row">
                <div>
                    <label for="editDesa">Desa</label>
                    <input type="text" id="editDesa">
                </div>
                <div>
                    <label for="editKecamatan">Kecamatan</label>
                    <input type="text" id="editKecamatan">
                </div>
            </div>
            
            <label for="editFile">Ganti Foto KTP? (Opsional)</label>
            <input type="file" id="editFile" accept="image/*" capture="environment">
            <small style="color:gray; font-size:10px;">*Biarkan kosong jika tidak ingin mengganti foto lama.</small>
            
            <p id="pesanEdit" style="text-align:center; font-weight:bold; font-size:13px; margin-top:10px;"></p>
            
            <button id="btnSimpanEdit" class="btn-simpan-modal" onclick="simpanEditKtp()">💾 Simpan Perubahan</button>
            <button class="btn-batal-modal" onclick="tutupModalEdit()">✖ Batal</button>
        </div>
    </div>

    <script>
        // --- KONEKSI SUPABASE ---
        const supabaseUrl = 'https://ftlzqrwrlivgszomwhhb.supabase.co';
        const supabaseKey = 'sb_publishable_iGscw6ePzAq4ty_PFp20SQ_aR2HsxP9';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let halamanSaatIni = 1;
        const jumlahPerHalaman = 10;
        let totalData = 0;
        let keywordPencarian = ""; 

        window.terapkanPencarian = function() {
            keywordPencarian = document.getElementById('inputCari').value.trim();
            halamanSaatIni = 1; 
            muatDataKtp();
        }

        window.resetPencarian = function() {
            document.getElementById('inputCari').value = "";
            keywordPencarian = "";
            halamanSaatIni = 1;
            muatDataKtp();
        }

        window.jikaEnter = function(event) { if (event.key === "Enter") terapkanPencarian(); }

        // --- TARIK DATA ---
        async function muatDataKtp() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tabelDbKtp').style.display = 'none';

            let indexMulai = (halamanSaatIni - 1) * jumlahPerHalaman;
            let indexSelesai = indexMulai + jumlahPerHalaman - 1;

            let query = supabaseClient.from('dbKtp').select('*', { count: 'exact' }).order('nama', { ascending: true }).range(indexMulai, indexSelesai);
            // Tambah pencarian agar bisa nyari Desa juga!
            if (keywordPencarian !== "") {
                query = query.or(`nik.ilike.%${keywordPencarian}%,nama.ilike.%${keywordPencarian}%,desa.ilike.%${keywordPencarian}%`);
            }

            const { data, error, count } = await query;

            if (error) { alert("Error: " + error.message); return; }

            totalData = count;
            renderTabel(data, indexMulai);
            aturTombolPaginasi();
        }

        // --- RENDER TABEL & TOMBOL EDIT ---
        function renderTabel(data, indexMulai) {
            let html = "";
            if (data.length === 0) {
                html = `<tr><td colspan="6" style="text-align:center; color:red;">Data tidak ditemukan.</td></tr>`;
            } else {
                data.forEach((d, i) => {
                    let nomorUrut = indexMulai + i + 1;
                    let foto = d.foto_ktp ? `<a href="${d.foto_ktp}" target="_blank"><img src="${d.foto_ktp}"></a>` : `-`;

                    // Trik JSON Stringify agar semua kolom ikut terbawa tanpa pusing tanda kutip
                    let dataAman = encodeURIComponent(JSON.stringify(d));

                    html += `
                        <tr>
                            <td>${nomorUrut}</td>
                            <td>${foto}</td>
                            <td style="font-family: monospace; font-size:14px; font-weight:bold;">${d.nik}</td>
                            <td style="text-align:left;"><b>${d.nama}</b><br><span style="font-size:11px; color:#28a745; font-weight:bold;">📞 ${d.hp || 'Belum ada no HP'}</span></td>
                            <td>${d.desa || '-'}</td>
                            <td>
                                <button class="btn-edit" onclick="bukaModalEdit('${dataAman}')">✏️ Edit</button>
                            </td>
                        </tr>
                    `;
                });
            }
            document.getElementById('isiTabel').innerHTML = html;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('tabelDbKtp').style.display = 'table';
        }

        function aturTombolPaginasi() {
            let totalHalaman = Math.ceil(totalData / jumlahPerHalaman) || 1;
            document.getElementById('pageInfo').innerHTML = `Hal ${halamanSaatIni} dari ${totalHalaman} <br><span style="font-size:11px; color:#007bff;">(${totalData} Data)</span>`;
            document.getElementById('btnPrev').disabled = (halamanSaatIni === 1);
            document.getElementById('btnNext').disabled = (halamanSaatIni === totalHalaman);
        }

        function gantiHalaman(arah) { halamanSaatIni += arah; muatDataKtp(); }

        // ==========================================
        // --- MESIN EDIT DATA KTP (LENGKAP) ---
        // ==========================================
        window.bukaModalEdit = function(dataString) {
            // Bongkar data dari JSON Stringify
            let d = JSON.parse(decodeURIComponent(dataString));

            // Isi semua kolom sesuai data di database
            document.getElementById('editNik').value = d.nik;
            document.getElementById('editNama').value = d.nama || '';
            document.getElementById('editHp').value = d.hp || '';
            document.getElementById('editGender').value = d.gender || 'L';
            document.getElementById('editTglLahir').value = d.tgl_lahir || '';
            document.getElementById('editAlamat').value = d.alamat || '';
            document.getElementById('editDesa').value = d.desa || '';
            document.getElementById('editKecamatan').value = d.kecamatan || '';
            
            document.getElementById('editFile').value = ""; 
            document.getElementById('pesanEdit').innerText = "";
            
            document.getElementById('modalEdit').style.display = 'block';
        }

        window.tutupModalEdit = function() {
            document.getElementById('modalEdit').style.display = 'none';
        }

        window.simpanEditKtp = async function() {
            // Ambil data (NIK diambil dari kolom yang disabled)
            let nik = document.getElementById('editNik').value;
            let namaBaru = document.getElementById('editNama').value.trim();
            let hpBaru = document.getElementById('editHp').value.trim();
            let genderBaru = document.getElementById('editGender').value;
            let tglLahirBaru = document.getElementById('editTglLahir').value.trim();
            let alamatBaru = document.getElementById('editAlamat').value.trim();
            let desaBaru = document.getElementById('editDesa').value.trim();
            let kecamatanBaru = document.getElementById('editKecamatan').value.trim();
            
            let fileInput = document.getElementById('editFile');
            let pesanDiv = document.getElementById('pesanEdit');
            let btn = document.getElementById('btnSimpanEdit');

            if (namaBaru === "") { alert("Nama tidak boleh kosong!"); return; }

            pesanDiv.innerText = "⏳ Memproses perubahan...";
            pesanDiv.style.color = "blue";
            btn.disabled = true;

            // Paket Data Update
            let dataUpdate = { 
                nama: namaBaru,
                hp: hpBaru,
                gender: genderBaru,
                tgl_lahir: tglLahirBaru,
                alamat: alamatBaru,
                desa: desaBaru,
                kecamatan: kecamatanBaru
            };

            // JIKA USER MEMILIH FOTO BARU
            if (fileInput.files.length > 0) {
                pesanDiv.innerText = "⏳ Mengunggah foto baru...";
                let fileFoto = fileInput.files[0];
                let namaFileUnik = `KTP_${nik}_${Date.now()}.jpg`;

                const { error: uploadErr } = await supabaseClient.storage
                    .from('ktp')
                    .upload(namaFileUnik, fileFoto, { cacheControl: '3600', upsert: false });

                if (uploadErr) {
                    pesanDiv.innerText = "❌ Gagal Upload Foto: " + uploadErr.message;
                    pesanDiv.style.color = "red";
                    btn.disabled = false;
                    return;
                }

                const { data: urlData } = supabaseClient.storage.from('ktp').getPublicUrl(namaFileUnik);
                dataUpdate.foto_ktp = urlData.publicUrl; 
            }

            // SIMPAN PERUBAHAN KE DATABASE
            pesanDiv.innerText = "💾 Menyimpan ke database...";
            const { error: dbErr } = await supabaseClient
                .from('dbKtp')
                .update(dataUpdate)
                .eq('nik', nik); // Acuan update tetap NIK

            if (dbErr) {
                pesanDiv.innerText = "❌ Gagal Simpan: " + dbErr.message;
                pesanDiv.style.color = "red";
            } else {
                pesanDiv.innerText = "✅ Perubahan berhasil disimpan!";
                pesanDiv.style.color = "green";
                
                muatDataKtp(); // Refresh tabel
                
                setTimeout(() => {
                    tutupModalEdit();
                }, 1500);
            }
            btn.disabled = false;
        }

        // Jalankan saat pertama
        muatDataKtp();
    </script>
</body>
</html>
