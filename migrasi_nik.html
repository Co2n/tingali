<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alat Migrasi Data NIK (Mode CSV)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        
        /* Area Kontrol CSV */
        .csv-box { background: #e9ecef; padding: 15px; border-radius: 6px; text-align: center; margin-bottom: 20px; border: 2px dashed #007bff; }
        .csv-box input[type="file"] { font-size: 16px; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; vertical-align: middle; }
        th { background-color: #007bff; color: white; }
        img { max-height: 120px; border-radius: 5px; cursor: pointer; border: 1px solid #ccc; transition: 0.3s; }
        img:hover { transform: scale(1.05); }
        input[type="text"] { padding: 8px; width: 160px; text-align: center; font-weight: bold; font-family: monospace; border: 2px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; width: 100%; }
        button:hover { background: #218838; }
        .success-bg { background-color: #e6ffed !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🛠️ Panel Entry Data NIK (Filter via CSV)</h2>
        
        <div class="csv-box">
            <p style="margin-top:0; font-weight:bold; color:#555;">1. Pilih file <code>fid.csv</code> Anda:</p>
            <input type="file" id="csvFile" accept=".csv">
            <br>
            <button onclick="prosesCSV()" style="width: auto; padding: 10px 20px; background:#007bff;">🚀 Muat Data dari CSV</button>
        </div>

        <div id="loading" style="text-align:center; font-weight:bold; color:blue; display:none;">⏳ Mengambil data dari Supabase (ini mungkin butuh beberapa detik)...</div>

        <table id="tabelMigrasi" style="display:none;">
            <thead>
                <tr>
                    <th>FID & Pemilik</th>
                    <th>Foto KTP -> NIK 1</th>
                    <th>Foto KTP Agree -> NIK 2</th>
                </tr>
            </thead>
            <tbody id="isiTabel">
                </tbody>
        </table>
    </div>

    <script>
        // --- KONEKSI SUPABASE ---
        const supabaseUrl = 'https://ftlzqrwrlivgszomwhhb.supabase.co';
        const supabaseKey = 'sb_publishable_iGscw6ePzAq4ty_PFp20SQ_aR2HsxP9';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // --- 1. PROSES BACA FILE CSV ---
        function prosesCSV() {
            const fileInput = document.getElementById('csvFile');
            if (fileInput.files.length === 0) {
                alert("Pilih dulu file fid.csv nya, bro!");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const text = e.target.result;
                // Pecah berdasarkan baris (enter)
                const baris = text.split(/\r?\n/);
                let arrayFid = [];

                for (let i = 0; i < baris.length; i++) {
                    // Ambil kolom pertama, hapus tanda kutip (jika ada), dan spasi
                    let val = baris[i].replace(/['"]/g, '').split(',')[0].trim();
                    
                    // Abaikan baris kosong dan baris judul (Header)
                    if (val && val.toLowerCase() !== 'fid') {
                        arrayFid.push(val);
                    }
                }

                if (arrayFid.length === 0) {
                    alert("Tidak ada data FID yang valid di dalam CSV.");
                    return;
                }

                console.log("Ditemukan " + arrayFid.length + " FID di CSV. Memulai penarikan data...");
                tarikDataSupabaseBatch(arrayFid);
            };

            reader.readAsText(file);
        }

        // --- 2. TARIK DATA DARI SUPABASE DENGAN SISTEM BATCH (CICIL) ---
        async function tarikDataSupabaseBatch(semuaFid) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('tabelMigrasi').style.display = 'none';
            document.getElementById('isiTabel').innerHTML = ""; // Bersihkan tabel lama

            let dataTerkumpul = [];
            let ukuranBatch = 200; // Tarik per 200 data agar Supabase tidak kepanasan

            for (let i = 0; i < semuaFid.length; i += ukuranBatch) {
                let batchFid = semuaFid.slice(i, i + ukuranBatch);
                
                const { data, error } = await supabaseClient
                    .from('ONLINE_09_03_2026_2000')
                    .select('fid, pemilik, ktp, ktpagree, nik1, nik2')
                    .in('fid', batchFid); // "Tolong cari data yang FID-nya ada di daftar ini"

                if (error) {
                    console.error("Error pada batch " + i + ":", error);
                    continue; // Jika satu kelompok gagal, lanjut ke kelompok berikutnya
                }

                if (data) {
                    dataTerkumpul = dataTerkumpul.concat(data);
                }
            }

            renderTabel(dataTerkumpul);
        }

        // --- 3. TAMPILKAN KE TABEL ---
        function renderTabel(data) {
            // Filter: Hanya tampilkan yang ada fotonya
            let dataTampil = data.filter(d => 
                (d.ktp && d.ktp.trim() !== '') || (d.ktpagree && d.ktpagree.trim() !== '')
            );

            let html = "";
            dataTampil.forEach(d => {
                let ktpHtml = "-";
                let ktpagreeHtml = "-";

                // Jika ada KTP, buat form NIK1
                if (d.ktp && d.ktp.trim() !== '') {
                    ktpHtml = `
                        <a href="${d.ktp}" target="_blank"><img src="${d.ktp}" title="Klik untuk perbesar"></a><br>
                        <input type="text" id="nik1_${d.fid}" value="${d.nik1 || ''}" placeholder="Ketik NIK 1" maxlength="16">
                        <button id="btn1_${d.fid}" onclick="simpanNIK('${d.fid}', 'nik1')">💾 Simpan NIK 1</button>
                    `;
                }

                // Jika ada KTP Agree, buat form NIK2
                if (d.ktpagree && d.ktpagree.trim() !== '') {
                    ktpagreeHtml = `
                        <a href="${d.ktpagree}" target="_blank"><img src="${d.ktpagree}" title="Klik untuk perbesar"></a><br>
                        <input type="text" id="nik2_${d.fid}" value="${d.nik2 || ''}" placeholder="Ketik NIK 2" maxlength="16">
                        <button id="btn2_${d.fid}" onclick="simpanNIK('${d.fid}', 'nik2')">💾 Simpan NIK 2</button>
                    `;
                }

                // Warnai hijau jika dua-duanya (atau salah satu yang ada) sudah terisi NIK
                let isNik1Isi = (d.ktp ? (d.nik1 && d.nik1 !== '') : true);
                let isNik2Isi = (d.ktpagree ? (d.nik2 && d.nik2 !== '') : true);
                let rowClass = (isNik1Isi && isNik2Isi) ? "success-bg" : "";

                html += `
                    <tr id="row_${d.fid}" class="${rowClass}">
                        <td><b>FID: ${d.fid}</b><br><br>${d.pemilik || 'Tidak ada nama'}</td>
                        <td>${ktpHtml}</td>
                        <td>${ktpagreeHtml}</td>
                    </tr>
                `;
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('tabelMigrasi').style.display = 'table';
            
            if(dataTampil.length === 0) {
                document.getElementById('isiTabel').innerHTML = "<tr><td colspan='3'>Dari daftar CSV tersebut, tidak ada satupun bidang yang memiliki foto KTP/KTP Agree.</td></tr>";
            } else {
                document.getElementById('isiTabel').innerHTML = html;
            }
        }

        // --- 4. FUNGSI SIMPAN KE SUPABASE (Sama seperti sebelumnya) ---
        window.simpanNIK = async function(fid, kolomTarget) {
            let inputId = `${kolomTarget}_${fid}`;
            let btnId = (kolomTarget === 'nik1') ? `btn1_${fid}` : `btn2_${fid}`;
            
            let nilaiNik = document.getElementById(inputId).value.trim();
            let btn = document.getElementById(btnId);

            if (nilaiNik.length < 16 && nilaiNik.length > 0) {
                let konfirmasi = confirm("⚠️ NIK biasanya 16 digit. Yakin ingin menyimpan?");
                if(!konfirmasi) return;
            }

            btn.innerText = "⏳...";
            btn.style.background = "#ffc107";
            btn.style.color = "black";

            // Tembak ke database
            const { error } = await supabaseClient
                .from('ONLINE_09_03_2026_2000')
                .update({ [kolomTarget]: nilaiNik })
                .eq('fid', fid);

            if (error) {
                alert("❌ Gagal menyimpan: " + error.message);
                btn.innerText = "💾 Coba Lagi";
                btn.style.background = "red";
                btn.style.color = "white";
            } else {
                btn.innerText = "✅ Tersimpan";
                btn.style.background = "#28a745";
                btn.style.color = "white";
                cekBarisSelesai(fid);
            }
        };

        function cekBarisSelesai(fid) {
            let input1 = document.getElementById(`nik1_${fid}`);
            let input2 = document.getElementById(`nik2_${fid}`);
            
            let ok1 = input1 ? (input1.value.trim() !== '') : true;
            let ok2 = input2 ? (input2.value.trim() !== '') : true;

            if (ok1 && ok2) {
                document.getElementById(`row_${fid}`).classList.add('success-bg');
            } else {
                document.getElementById(`row_${fid}`).classList.remove('success-bg');
            }
        }
    </script>
</body>
</html>
